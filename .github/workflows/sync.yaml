name: Sync Upstream

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/lyc8503/UptimeFlare.git
          git fetch upstream main

      - name: Merge upstream changes
        run: |
          git checkout main
          git merge upstream/main --no-edit --allow-unrelated-histories || true
          # Restore our config file in case of conflicts
          git checkout HEAD -- uptime.config.ts

      - name: Push changes
        run: |
          git push origin main
